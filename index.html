<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FlipKit">
<title>FlipKit</title>
<style>
:root{
  --bg:#0f0e0d;--card:#1c1b19;--card2:#242220;--card3:#2c2a27;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --amber:#e8a547;--amberBg:rgba(232,165,71,0.12);
  --text:#f0ece4;--text2:#a09890;--text3:#635e5a;
  --green:#5ec47a;--greenBg:rgba(94,196,122,0.12);
  --blue:#5a9ef0;--blueBg:rgba(90,158,240,0.12);
  --red:#e05550;--purple:#c09ae0;--purpleBg:rgba(192,154,224,0.12);
  --r:16px;--r-sm:10px;--r-xs:7px;
  --st:env(safe-area-inset-top);--sb:env(safe-area-inset-bottom);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:-apple-system,system-ui,sans-serif;font-size:16px;line-height:1}
#app{display:flex;flex-direction:column;height:100%;max-width:430px;margin:0 auto}
.hdr{flex-shrink:0;padding:calc(var(--st) + 14px) 16px 10px;background:rgba(15,14,13,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:0.5px solid var(--border);z-index:5}
.scrl{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px 14px calc(var(--sb) + 82px)}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;display:flex;border-top:0.5px solid var(--border);padding-bottom:var(--sb);background:rgba(15,14,13,.94);backdrop-filter:blur(24px);z-index:10}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:10px 0;background:none;border:none;cursor:pointer;color:var(--text3);font-size:10px;font-family:inherit;letter-spacing:.03em;transition:color .15s}
.nb.on{color:var(--amber)}.nb.on svg{filter:drop-shadow(0 0 4px rgba(232,165,71,.4))}
.card{background:var(--card);border-radius:var(--r);border:0.5px solid var(--border);overflow:hidden;margin-bottom:8px}
@keyframes cardOut{0%{opacity:1;transform:scale(1);max-height:500px;margin-bottom:8px}50%{opacity:0;transform:scale(.95) translateY(-8px)}100%{opacity:0;max-height:0;margin-bottom:0;border-width:0}}
.card.exit,.bike-group.exit{animation:cardOut .44s cubic-bezier(.4,0,.2,1) forwards;pointer-events:none}
.hero{position:relative;width:100%;aspect-ratio:16/9;background:var(--card2);overflow:hidden}
.hero.tall{aspect-ratio:4/3}
.hero img{width:100%;height:100%;object-fit:cover;display:block}
.hero-grad{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.78) 0%,rgba(0,0,0,.1) 55%,transparent 100%)}
.hero-info{position:absolute;bottom:11px;left:13px;right:13px}
.hero-info h3{font-size:16px;font-weight:600;color:#fff;text-shadow:0 1px 6px rgba(0,0,0,.5)}
.hero-info p{font-size:11px;color:rgba(255,255,255,.65);margin-top:3px}
.hero-cam{position:absolute;top:10px;right:10px;width:34px;height:34px;border-radius:50%;background:rgba(0,0,0,.5);backdrop-filter:blur(8px);border:0.5px solid rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff}
.hero-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;color:var(--text3)}
.hero-ph svg{opacity:.4}.hero-ph span{font-size:12px;opacity:.6}
.trow{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:0.5px solid var(--border);cursor:pointer;user-select:none;-webkit-user-select:none;transition:opacity .1s}
.trow:last-child{border-bottom:none}.trow:active{opacity:.65}
.chk{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .25s cubic-bezier(.34,1.56,.64,1);position:relative}
.chk.ok{background:var(--green);border-color:var(--green)}
@keyframes rpl{0%{transform:scale(0);opacity:.5}100%{transform:scale(2.5);opacity:0}}
.chk.ok::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,.4);border-radius:50%;animation:rpl .35s ease-out forwards}
.ttext{flex:1;font-size:13px;line-height:1.3;color:var(--text)}
.ttext.done{text-decoration:line-through;color:var(--text3)}
.tlink{font-size:11px;color:var(--blue);text-decoration:none;display:block;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px}
.tag{font-size:10px;font-weight:500;padding:2px 6px;border-radius:5px;flex-shrink:0;white-space:nowrap}
.tg-fix,.tg-buy,.tg-fix,.tg-order{background:var(--blueBg);color:var(--blue)}
.tg-clean,.tg-photo,.tg-list,.tg-listing,.tg-other{background:var(--amberBg);color:var(--amber)}
.inp{width:100%;padding:11px 13px;background:var(--card2);border:0.5px solid var(--border2);border-radius:var(--r-sm);color:var(--text);font-size:15px;font-family:inherit;outline:none;-webkit-appearance:none;transition:border-color .15s}
.inp:focus{border-color:var(--amber)}.inp::placeholder{color:var(--text3)}
.btn{display:flex;align-items:center;justify-content:center;gap:7px;padding:13px;border-radius:var(--r-sm);font-size:15px;font-family:inherit;font-weight:600;cursor:pointer;border:none;width:100%;transition:opacity .15s,transform .1s}
.btn:active{opacity:.8;transform:scale(.98)}.btn-p{background:var(--amber);color:#160f00}.btn-g{background:var(--card2);color:var(--text);border:0.5px solid var(--border2)}
.btn-sm{display:inline-flex;align-items:center;gap:5px;padding:6px 11px;border-radius:var(--r-xs);font-size:12px;font-family:inherit;font-weight:500;cursor:pointer;border:0.5px solid var(--border2);background:var(--card2);color:var(--text2);white-space:nowrap}
.btn-sm:active{opacity:.7}
.row{display:flex;align-items:center;gap:8px}.row-sb{display:flex;align-items:center;justify-content:space-between;gap:8px}
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:8px;font-size:11px;font-weight:500;flex-shrink:0}
.bw{background:var(--amberBg);color:var(--amber)}.bg{background:var(--greenBg);color:var(--green)}
.lbl{font-size:13px;color:var(--text2);margin-bottom:5px;display:block}
.form-group{margin-bottom:12px}
.sec{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);padding:12px 0 6px}
.empty{text-align:center;padding:48px 24px;color:var(--text3);font-size:14px;line-height:1.9}
.back-btn{background:none;border:none;color:var(--amber);cursor:pointer;display:flex;align-items:center;padding:0;margin-right:4px;flex-shrink:0}
.pbar{height:2px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:5px}
.pbar-f{height:100%;border-radius:2px;transition:width .4s ease}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;flex-shrink:0}
.av0{background:#9FE1CB;color:#085041}.av1{background:#CECBF6;color:#3C3489}
.av2{background:#F5C4B3;color:#712B13}.av3{background:#FAC775;color:#633806}
.av4{background:#B5D4F4;color:#185FA5}.av5{background:#C0DD97;color:#3B6D11}
.uchip{display:inline-flex;align-items:center;justify-content:center;border-radius:50%;font-weight:700;font-size:10px;cursor:pointer;flex-shrink:0;border:1.5px solid transparent;transition:all .15s;user-select:none;-webkit-user-select:none}
.uchip:active{transform:scale(.9)}
.uchip.u0{background:rgba(159,225,203,.15);color:#9FE1CB;border-color:rgba(159,225,203,.3)}
.uchip.u1{background:rgba(250,199,117,.15);color:#FAC775;border-color:rgba(250,199,117,.3)}
.uchip.un{background:var(--card2);color:var(--text3);border-color:var(--border2)}
.ptoggle{display:flex;background:var(--card2);border-radius:20px;padding:2px;gap:2px;border:0.5px solid var(--border)}
.ptbtn{flex:1;padding:5px 10px;border:none;border-radius:18px;background:none;color:var(--text3);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.ptbtn.on{background:var(--card3);color:var(--text)}
.bike-group{background:var(--card);border-radius:var(--r);border:0.5px solid var(--border);margin-bottom:8px;overflow:hidden}
.bike-group-hdr{display:flex;align-items:center;gap:9px;padding:9px 11px;border-bottom:0.5px solid var(--border);cursor:pointer}
.bike-group-hdr:active{background:var(--card2)}
.bike-group-tasks{padding:0 11px}
.standalone-row{display:flex;align-items:center;gap:8px;padding:9px 11px;background:var(--card);border-radius:var(--r-sm);border:0.5px solid var(--border);margin-bottom:6px;cursor:pointer}
.standalone-row:active{opacity:.75}
.bgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.gc{background:var(--card);border-radius:var(--r);border:0.5px solid var(--border);overflow:hidden;cursor:pointer;display:flex;flex-direction:column}
.gc:active{opacity:.8}
.gc-photo{position:relative;width:100%;aspect-ratio:4/3;background:var(--card2);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.gc-photo img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}
.gc-ph{display:flex;flex-direction:column;align-items:center;gap:5px;color:var(--text3)}
.gc-ph span{font-size:10px}
.gc-cam{position:absolute;bottom:7px;right:7px;width:28px;height:28px;border-radius:50%;background:rgba(0,0,0,.55);backdrop-filter:blur(6px);border:0.5px solid rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;color:#fff;z-index:2}
.gc-body{padding:8px 9px 10px;flex:1;display:flex;flex-direction:column;gap:3px}
.gc-body.st-fix{background:rgba(90,158,240,.12)}
.gc-body.st-ready{background:rgba(232,165,71,.12)}
.gc-body.st-listed{background:rgba(94,196,122,.12)}
.gc-body.st-sold{background:rgba(100,100,100,.08)}
.gc-name{font-size:13px;font-weight:600;line-height:1.25;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gc-sub{font-size:11px;color:var(--text3);line-height:1.3}
.gc-bar{height:4px;width:100%;flex-shrink:0;overflow:hidden}
.s-fix{background:var(--blue)}.s-ready{background:var(--amber)}.s-listed{background:var(--green)}.s-sold{background:var(--text3)}
.bike-group.fix-stage{border-left:3px solid var(--blue);background:rgba(90,158,240,.04)}
.bike-group.ready-stage{border-left:3px solid var(--amber);background:rgba(232,165,71,.04)}
.bike-group.listed-stage{border-left:3px solid var(--green);background:rgba(94,196,122,.04)}
@keyframes soldGlow{0%,100%{box-shadow:0 0 8px rgba(94,196,122,.3)}50%{box-shadow:0 0 22px rgba(94,196,122,.7),0 0 44px rgba(94,196,122,.25)}}

.add-task-link{display:flex;align-items:center;gap:6px;padding:8px 0 8px;font-size:12px;color:var(--text3);cursor:pointer;border-top:0.5px solid var(--border)}
.add-task-link:active{color:var(--amber)}
.spills{display:flex;gap:5px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;margin-top:8px;padding-bottom:1px}
.spills::-webkit-scrollbar{display:none}
.spill{padding:5px 11px;border-radius:20px;font-size:12px;font-family:inherit;cursor:pointer;border:0.5px solid var(--border2);background:none;color:var(--text3);font-weight:500;white-space:nowrap;flex-shrink:0;transition:all .15s}
.spill.sa.on{background:var(--card2);color:var(--text);border-color:var(--border)}
.spill.sf{color:var(--blue)}.spill.sf.on{background:var(--blue);color:#fff;border-color:var(--blue)}
.spill.sr{color:var(--amber)}.spill.sr.on{background:var(--amber);color:#160f00;border-color:var(--amber)}
.spill.sl{color:var(--green)}.spill.sl.on{background:var(--green);color:#051510;border-color:var(--green)}
.spill.ss.on{background:var(--card2);color:var(--text);border-color:var(--border)}
.cost-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:0.5px solid var(--border)}
.cost-row:last-child{border-bottom:none}
.stale-banner{background:var(--amberBg);border:0.5px solid rgba(232,165,71,.3);border-radius:var(--r-sm);padding:9px 12px;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px}
.pthumb{aspect-ratio:1;object-fit:cover;width:100%;border-radius:5px;cursor:pointer;display:block;background:var(--card2)}
.padd-btn{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:5px;border:1.5px dashed var(--text3);cursor:pointer;background:none;color:var(--text3);font-size:24px;line-height:1}
.padd-btn:active{border-color:var(--amber);color:var(--amber)}
.sold-total{background:var(--card);border-radius:var(--r);border:0.5px solid var(--border);padding:12px 14px;margin-top:4px;display:flex;justify-content:space-between;align-items:center}
.toggle{width:40px;height:24px;border-radius:12px;border:none;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
.toggle.on{background:var(--amber)}.toggle.off{background:var(--card3)}
.toggle::after{content:'';position:absolute;top:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.toggle.on::after{left:19px}.toggle.off::after{left:3px}
.dtask-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:0.5px solid var(--border)}
.dtask-row:last-child{border-bottom:none}
.copt{padding:6px 13px;border-radius:8px;border:0.5px solid var(--border2);background:var(--card2);color:var(--text2);font-size:13px;cursor:pointer;font-family:inherit;transition:all .15s}
.copt.sel{background:var(--amber);color:#160f00;border-color:var(--amber);font-weight:500}
.fab{position:fixed;bottom:calc(var(--sb) + 68px);right:max(16px,calc(50vw - 199px));width:52px;height:52px;border-radius:50%;background:var(--amber);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:9;color:#160f00;box-shadow:0 4px 18px rgba(232,165,71,.4);transition:transform .1s}
.fab:active{transform:scale(.92)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:50;display:flex;align-items:flex-end;justify-content:center}
.sheet{background:var(--card);border-radius:20px 20px 0 0;width:100%;max-width:430px;padding:16px 16px calc(var(--sb) + 24px);max-height:90vh;overflow-y:auto}
.sheet-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 16px}
.sheet-title{font-size:17px;font-weight:700;margin-bottom:14px}
.confirm-sheet{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:60;display:flex;align-items:flex-end;justify-content:center}
.confirm-box{background:var(--card);border-radius:20px 20px 0 0;width:100%;max-width:430px;padding:20px 16px calc(var(--sb) + 20px)}
#viewer{position:fixed;inset:0;background:#000;z-index:100;display:none;flex-direction:column;align-items:center;justify-content:center}
.viewer-bar{position:absolute;top:0;left:0;right:0;padding:calc(var(--st) + 12px) 16px 14px;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(to bottom,rgba(0,0,0,.7),transparent)}
#viewer img{max-width:100%;max-height:80vh;object-fit:contain;border-radius:4px}
.viewer-actions{position:absolute;bottom:calc(var(--sb) + 20px);display:flex;gap:10px}
#toast{position:fixed;bottom:calc(var(--sb) + 82px);left:50%;transform:translateX(-50%) translateY(16px);background:var(--card);color:var(--text);padding:10px 20px;border-radius:24px;font-size:14px;border:0.5px solid var(--border2);opacity:0;transition:opacity .25s,transform .25s;z-index:50;pointer-events:none;max-width:calc(100vw - 32px);text-align:center;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#fx{position:fixed;inset:0;pointer-events:none;z-index:200;display:none}
.sch-btn{font-size:11px;padding:2px 7px;border-radius:7px;border:0.5px solid var(--border2);background:none;color:var(--text2);cursor:pointer;font-family:inherit}

/* Today card stage: full border */
.bike-group.fix-stage{border:1.5px solid rgba(90,158,240,.55);background:rgba(90,158,240,.08)}
.bike-group.ready-stage{border:1.5px solid rgba(232,165,71,.55);background:rgba(232,165,71,.08)}
.bike-group.listed-stage{border:1.5px solid rgba(94,196,122,.55);background:rgba(94,196,122,.08)}

/* Heartbeat when all tasks done */
@keyframes heartbeatGlow{0%,100%{box-shadow:0 0 0 0 rgba(94,196,122,0);border-color:rgba(94,196,122,.3)}50%{box-shadow:0 0 0 4px rgba(94,196,122,.18),inset 0 0 12px rgba(94,196,122,.06);border-color:rgba(94,196,122,.8)}}
.bike-group.all-done-beat{animation:heartbeatGlow 1.1s ease-in-out infinite;border:1.5px solid rgba(94,196,122,.5)!important;background:rgba(94,196,122,.05)!important}
.done-today-reveal{overflow:hidden;max-height:0;transition:max-height .35s cubic-bezier(.4,0,.2,1)}
.done-today-reveal.show{max-height:60px}
.done-today-btn{width:100%;padding:11px;background:rgba(94,196,122,.1);border:none;border-top:0.5px solid rgba(94,196,122,.2);color:var(--green);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:7px;letter-spacing:.01em}
.done-today-btn:active{background:rgba(94,196,122,.2)}

/* Task text area */
.task-ta{width:100%;padding:11px 13px;background:var(--card2);border:0.5px solid var(--border2);border-radius:var(--r-sm);color:var(--text);font-size:15px;font-family:inherit;outline:none;-webkit-appearance:none;transition:border-color .15s;resize:none;min-height:68px;line-height:1.45}
.task-ta:focus{border-color:var(--amber)}.task-ta::placeholder{color:var(--text3)}

/* Bike thumbnails in modal select */
.bike-pick{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:4px}
.bpick-item{border-radius:var(--r-sm);border:1.5px solid var(--border2);overflow:hidden;cursor:pointer;position:relative;aspect-ratio:4/3;background:var(--card2);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:3px;padding:4px}
.bpick-item.sel{border-color:var(--amber)}
.bpick-item img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.bpick-item span{font-size:9px;font-weight:600;color:var(--text2);position:relative;z-index:1;text-align:center;padding:0 2px;text-shadow:0 1px 3px rgba(0,0,0,.6);line-height:1.2}
.bpick-none{border-radius:var(--r-sm);border:0.5px solid var(--border2);padding:9px 10px;cursor:pointer;font-size:12px;color:var(--text3);background:var(--card2);display:flex;align-items:center;gap:6px;margin-bottom:6px}
.bpick-none.sel{border-color:var(--amber);color:var(--amber)}

/* Photo square on add bike */
.nb-photo-box{aspect-ratio:4/3;background:var(--card2);border-radius:var(--r-sm);border:1.5px dashed var(--border2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;cursor:pointer;color:var(--text3);margin-top:4px;overflow:hidden;position:relative}
.nb-photo-box img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.nb-photo-box:active{border-color:var(--amber)}

/* Sold glow */

.sold-glow-btn{animation:soldGlow 2s ease-in-out infinite;border-color:rgba(94,196,122,.5)!important;color:var(--green)!important}

/* Profile redesign helpers */
.stat-pill{background:var(--card2);border-radius:var(--r-sm);padding:9px 11px;display:flex;flex-direction:column;gap:3px;flex:1;min-width:0}
.stat-pill.editable{border:0.5px solid var(--border2);transition:border-color .15s}
.stat-pill.editable:focus-within{border-color:var(--amber)}
.stat-pill-lbl{font-size:10px;color:var(--text3);letter-spacing:.04em;text-transform:uppercase}
.stat-pill-val{font-size:15px;font-weight:700;color:var(--text)}
.task-section{background:var(--card);border-radius:var(--r);border:0.5px solid var(--border);margin-bottom:8px;overflow:hidden}
.task-section-hdr{padding:9px 13px;display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid var(--border)}
.task-section-hdr-title{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase}
.inline-price-reveal{overflow:hidden;max-height:0;transition:max-height .3s ease}
.inline-price-reveal.open{max-height:120px}
</style>
</head>
<body>
<div id="app"><div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text3);font-size:14px">Loading&#8230;</div></div>
<div id="toast"></div>
<canvas id="fx"></canvas>
<div id="viewer">
  <div class="viewer-bar">

const SB_HDR={'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Prefer':'return=representation'};

async function sbGet(table,params){
  var url=SB_URL+'/rest/v1/'+table+'?'+params;
  var r=await fetch(url,{headers:SB_HDR});
  if(!r.ok)throw new Error('GET '+table+' failed: '+r.status);
  return r.json();
}
async function sbInsert(table,obj){
  var r=await fetch(SB_URL+'/rest/v1/'+table,{method:'POST',headers:SB_HDR,body:JSON.stringify(obj)});
  if(!r.ok){var t=await r.text();throw new Error('INSERT '+table+' failed: '+t);}
  var d=await r.json();return Array.isArray(d)?d[0]:d;
}
async function sbUpdate(table,id,obj){
  var r=await fetch(SB_URL+'/rest/v1/'+table+'?id=eq.'+id,{method:'PATCH',headers:SB_HDR,body:JSON.stringify(obj)});
  if(!r.ok){var t=await r.text();throw new Error('UPDATE '+table+' failed: '+t);}
  var d=await r.json();return Array.isArray(d)?d[0]:d;
}
async function sbDelete(table,id){
  var r=await fetch(SB_URL+'/rest/v1/'+table+'?id=eq.'+id,{method:'DELETE',headers:{...SB_HDR,Prefer:''}});
  if(!r.ok)throw new Error('DELETE '+table+' failed: '+r.status);
}
async function sbUploadPhoto(path,blob){
  var contentType=blob.type||'image/jpeg';
  var r=await fetch(SB_URL+'/storage/v1/object/flipkit-photos/'+path,{
    method:'POST',
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':contentType,'x-upsert':'true'},
    body:blob
  });
  if(!r.ok){var t=await r.text();console.error('Upload error:',t);throw new Error('Upload failed: '+t);}
  return SB_URL+'/storage/v1/object/public/flipkit-photos/'+path;
}

function autoTag(text){
  var t=text.toLowerCase();
  if(/\b(buy|get|order|purchase|shop|pick\s*up)\b/.test(t))return 'buy';
  if(/\b(fix|repair|install|replace|adjust|service)\b/.test(t))return 'fix';
  if(/\b(relist|repost|post|list)\b/.test(t))return 'list';
  if(/\b(photo|photos|picture|pictures|shoot)\b/.test(t))return 'photo';
  if(/\b(clean|wash|wipe)\b/.test(t))return 'clean';
  return null;
}

/* ===================== LOAD DATA ===================== */
async function loadData(){
  var [bikes,photos,stTasks,costs]=await Promise.all([
    sbGet('bikes','order=created_at.asc'),
    sbGet('photos','order=created_at.asc'),
    sbGet('standalone_tasks','order=created_at.asc'),
    sbGet('costs','order=date.asc')
  ]);
  // Normalise bikes: map snake_case → camelCase, parse tasks jsonb
  S.bikes=bikes.map(function(b){return {
    id:b.id,name:b.name,bought:b.bought||0,frameSize:b.frame_size||'',
    sold:b.sold||false,soldFor:b.sold_for||null,
    listedAt:b.listed_at?new Date(b.listed_at).getTime():null,
    listedPrice:b.listed_price||null,
    createdAt:new Date(b.created_at).getTime(),
    tasks:b.tasks||[]
  };});
  // Photos
  S.photos={};
  S.bikes.forEach(function(b){S.photos[b.id]={cover:null,listing:[]};});
  photos.forEach(function(p){
    if(!S.photos[p.bike_id])S.photos[p.bike_id]={cover:null,listing:[]};
    var ph={id:p.id,bikeId:p.bike_id,type:p.type,url:p.storage_path,createdAt:new Date(p.created_at).getTime()};
    if(p.type==='cover')S.photos[p.bike_id].cover=ph;
    else S.photos[p.bike_id].listing.push(ph);
  });
  // Standalone tasks
  S.standaloneTasks=stTasks.map(function(t){return {
    id:t.id,text:t.text,autoTag:t.auto_tag,manualTag:t.manual_tag,cat:t.cat,
    today:t.today,done:t.done,assignee:t.assignee,url:t.url,
    createdAt:new Date(t.created_at).getTime()
  };});
  // Costs
  S.costs={};
  costs.forEach(function(c){
    var bikeId=c.bike_id;
    if(!S.costs[bikeId])S.costs[bikeId]=[];
    S.costs[bikeId].push({id:c.id,bikeId:bikeId,amount:c.amount,note:c.note||'',paidBy:c.paid_by,date:new Date(c.date).getTime()});
  });
}
function getUrl(p){
  if(!p)return null;
  // Supabase photos have a direct public URL stored in p.url
  return p.url||null;
}

/* STATUS */
function isFixCat(c){return c==='fix'||c==='repair'||c==='buy'||c==='order';}
function isReadyCat(c){return c==='photo'||c==='list'||c==='listing'||c==='clean'||c==='other';}
function etag(t){return t.autoTag||t.manualTag||t.cat||null;}
function getBikeStatus(bike){
  if(bike.sold)return 'sold';
  if(bike.listedAt)return 'listed';
  if((bike.tasks||[]).some(function(t){return isFixCat(etag(t))&&!t.done;}))return 'fix';
  return 'ready';
}
var SL={fix:'Fix',ready:'Prep',listed:'Listed',sold:'Sold'};
function isFixStage(tag){return tag==='fix'||tag==='buy'||tag==='repair'||tag==='order';}
function isReadyStage(tag){return tag==='clean'||tag==='photo'||tag==='list'||tag==='listing'||tag==='other';}
function getTodayStage(bike){
  var tasks=(bike.tasks||[]).filter(function(t){return t.today&&!t.done;});
  if(tasks.some(function(t){return isFixStage(etag(t));}))return 'fix';
  if(tasks.some(function(t){return isReadyStage(etag(t));}))return 'ready';
  if(bike.listedAt)return 'listed';
  return '';
}
var SC={fix:'var(--blue)',ready:'var(--amber)',listed:'var(--green)',sold:'var(--text3)'};
var SK={fix:'s-fix',ready:'s-ready',listed:'s-listed',sold:'s-sold'};
function listingAge(bike){
  if(!bike.listedAt)return '';
  var h=Math.floor((Date.now()-bike.listedAt)/3600000);
  if(h<24)return h<=1?'Listed 1h ago':'Listed '+h+'h ago';
  var d=Math.floor(h/24);
  return d===1?'Listed yesterday':'Listed '+d+' days ago';
}
function isStale(bike){return !!(bike.listedAt&&!bike.sold&&Date.now()-bike.listedAt>3*24*3600000);}
function bikeAv(i){return 'av'+(i%6);}
function bikeIn(b){return b.name.split(' ').map(function(w){return w[0]||'';}).join('').slice(0,2).toUpperCase();}
function pct(bike){if(!bike.tasks||!bike.tasks.length)return 0;return Math.round(bike.tasks.filter(function(t){return t.done;}).length/bike.tasks.length*100);}
function allDone(bike){return bike.tasks&&bike.tasks.length>0&&bike.tasks.every(function(t){return t.done;});}

/* SOUNDS */
function playSound(type){
  try{
    var A=new(window.AudioContext||window.webkitAudioContext)();
    function mk(freq,t0,dur,vol,tp){
      vol=vol||0.2;tp=tp||'triangle';
      var o=A.createOscillator(),g=A.createGain();o.connect(g);g.connect(A.destination);
      o.type=tp;o.frequency.setValueAtTime(freq,t0);
      g.gain.setValueAtTime(0,t0);g.gain.linearRampToValueAtTime(vol,t0+0.01);g.gain.exponentialRampToValueAtTime(0.001,t0+dur);
      o.start(t0);o.stop(t0+dur);
    }
    var t=A.currentTime;
    if(type==='done'){mk(880,t,.15,.12);mk(1108,t+.07,.2,.1);}
    else if(type==='listed'){mk(659,t,.12,.15);mk(880,t+.08,.15,.12);mk(1108,t+.16,.3,.1);}
    else if(type==='sold'){
      mk(659,t,.08,.15,'sine');mk(784,t+.06,.08,.15,'sine');mk(988,t+.12,.08,.15,'sine');
      mk(1319,t+.20,.4,.2,'triangle');mk(1568,t+.22,.4,.18,'triangle');
      mk(2093,t+.28,.5,.15,'sine');mk(2637,t+.32,.6,.12,'sine');
      mk(523,t+.24,.2,.06,'sawtooth');
    }
    setTimeout(function(){A.close();},2000);
  }catch(e){}
}

/* ANIMATIONS */
function animDone(el){
  playSound('done');
  var cv=document.getElementById('fx');cv.style.display='block';cv.width=window.innerWidth;cv.height=window.innerHeight;
  var ctx=cv.getContext('2d');
  var r=el?el.getBoundingClientRect():null;
  var cx=r?r.left+r.width/2:window.innerWidth/2,cy=r?r.top+r.height/2:window.innerHeight/2;
  var sparks=Array.from({length:12},function(){return {x:cx,y:cy,vx:(Math.random()-.5)*6,vy:(Math.random()-.5)*6,r:Math.random()*3+2,color:'hsl('+(130+Math.random()*30)+',70%,65%)'};});
  var st=null;
  function frame(ts){
    if(!st)st=ts;var el2=ts-st;
    ctx.clearRect(0,0,cv.width,cv.height);
    if(el2>700){cv.style.display='none';return;}
    var fade=1-el2/700;
    sparks.forEach(function(s){s.x+=s.vx;s.y+=s.vy;s.vy+=.12;ctx.save();ctx.globalAlpha=fade;ctx.fillStyle=s.color;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();ctx.restore();});
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}

function animListed(){
  playSound('listed');
  var cv=document.getElementById('fx');cv.style.display='block';cv.width=window.innerWidth;cv.height=window.innerHeight;
  var ctx=cv.getContext('2d'),cx=cv.width/2,cy=cv.height*.42;
  var stars=Array.from({length:18},function(){return {
    x:cx+(Math.random()-.5)*80,y:cy+40,
    vx:(Math.random()-.5)*3.5,vy:-(Math.random()*4+2),
    r:Math.random()*5+3,alpha:1,
    hue:130+Math.random()*30
  };});
  var st=null;
  function frame(ts){
    if(!st)st=ts;var el=ts-st;
    ctx.clearRect(0,0,cv.width,cv.height);
    if(el>1600){cv.style.display='none';return;}
    var fade=Math.max(0,1-el/1600);
    stars.forEach(function(s){
      s.x+=s.vx;s.y+=s.vy;s.vy+=.05;s.alpha=Math.max(0,fade*(1-el/1600));
      if(s.alpha<=0)return;
      ctx.save();ctx.globalAlpha=s.alpha;ctx.translate(s.x,s.y);
      var r=s.r;ctx.beginPath();
      for(var i=0;i<5;i++){ctx.lineTo(Math.cos((i*4*Math.PI/5)-Math.PI/2)*r,Math.sin((i*4*Math.PI/5)-Math.PI/2)*r);ctx.lineTo(Math.cos((i*4*Math.PI/5+2*Math.PI/5)-Math.PI/2)*r*.45,Math.sin((i*4*Math.PI/5+2*Math.PI/5)-Math.PI/2)*r*.45);}
      ctx.closePath();ctx.fillStyle='hsl('+s.hue+',75%,60%)';ctx.fill();ctx.restore();
    });
    if(el<1400){
      var sc=Math.min(1,el<180?el/180:el>1150?1-(el-1150)/250:1);
      ctx.save();ctx.globalAlpha=sc*fade;ctx.translate(cx,cy);ctx.scale(sc,sc);
      ctx.font='bold 40px -apple-system,system-ui,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillStyle='#5ec47a';ctx.fillText('Listed! \u2713',0,0);ctx.restore();
    }
    if(el>140&&el<1400){
      var sc2=Math.min(1,el<340?(el-140)/200:el>1150?1-(el-1150)/250:1);
      ctx.save();ctx.globalAlpha=sc2*fade*.75;ctx.translate(cx,cy+42);ctx.scale(sc2,sc2);
      ctx.font='500 15px -apple-system,system-ui,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillStyle='#a09890';ctx.fillText('Good luck with the sale \uD83E\uDD1E',0,0);ctx.restore();
    }
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}

function animSold(){
  playSound('sold');
  var cv=document.getElementById('fx');cv.style.display='block';cv.width=window.innerWidth;cv.height=window.innerHeight;
  var ctx=cv.getContext('2d'),cx=cv.width/2,cy=cv.height*.5;
  var coins=Array.from({length:24},function(){return {x:cx+(Math.random()-.5)*60,y:cy+80,vx:(Math.random()-.5)*7,vy:-(Math.random()*10+5),r:Math.random()*14+9,rot:Math.random()*Math.PI*2,rv:(Math.random()-.5)*.3,hue:35+Math.random()*25};});
  var st=null;
  function frame(ts){
    if(!st)st=ts;var el=ts-st;
    ctx.clearRect(0,0,cv.width,cv.height);
    var fade=Math.max(0,1-el/1800);
    if(el<1600){
      var sc=Math.min(1,el<200?el/200:el>1300?1-(el-1300)/300:1);
      ctx.save();ctx.globalAlpha=sc*fade;ctx.translate(cx,cy-30);ctx.scale(sc,sc);
      ctx.font='bold 46px -apple-system,system-ui,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillStyle='#f5c870';ctx.fillText('KA-CHING!',0,0);ctx.restore();
    }
    if(el>150&&el<1600){
      var sc2=Math.min(1,el<350?(el-150)/200:el>1300?1-(el-1300)/300:1);
      ctx.save();ctx.globalAlpha=sc2*fade*.8;ctx.translate(cx,cy+26);ctx.scale(sc2,sc2);
      ctx.font='500 17px -apple-system,system-ui,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillStyle='#a09890';ctx.fillText('Bike sold! \uD83C\uDF89',0,0);ctx.restore();
    }
    coins.forEach(function(c){
      c.vy+=.28;c.y+=c.vy;c.x+=c.vx;c.rot+=c.rv;
      var op=Math.max(0,fade*(1-el/1800));if(!op)return;
      ctx.save();ctx.globalAlpha=op;ctx.translate(c.x,c.y);ctx.rotate(c.rot);
      var scx=Math.abs(Math.cos(c.rot*2))*.7+.3;ctx.scale(scx,1);
      ctx.beginPath();ctx.arc(0,0,c.r,0,Math.PI*2);ctx.fillStyle='hsl('+c.hue+',85%,58%)';ctx.fill();
      ctx.strokeStyle='hsl('+c.hue+',90%,72%)';ctx.lineWidth=1.5;ctx.stroke();
      ctx.fillStyle='hsl('+c.hue+',60%,25%)';ctx.font='bold '+c.r+'px sans-serif';
      ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('\u20AC',0,0);ctx.restore();
    });
    if(el<1900)requestAnimationFrame(frame);
    else{ctx.clearRect(0,0,cv.width,cv.height);cv.style.display='none';}
  }
  requestAnimationFrame(frame);
}

/* TOAST */
var _tt;

/* ===================== PHOTOS ===================== */
var fileIn=document.getElementById('file-in');
fileIn.addEventListener('change',function(e){
  var f=e.target.files[0];if(!f||!S.photoTargetBike)return;fileIn.value='';
  showToast('Uploading photo...');
  var bikeId=S.photoTargetBike,mode=S.photoMode;
  // Handle add-bike flow (bikeId === -1) — store blob temporarily
  if(bikeId===-1){
    var reader=new FileReader();
    reader.onload=function(ev){S._nbPhotoBlob=new Blob([ev.target.result],{type:f.type});S._nbPhotoName=f.name.slice(0,20);renderAddBike();showToast('Photo ready');};
    reader.readAsArrayBuffer(f);return;
  }
  // Upload to Supabase Storage
  var path=bikeId+'/'+mode+'-'+Date.now()+'.jpg';
  var reader2=new FileReader();
  reader2.onload=async function(ev){
    try{
      var blob=new Blob([ev.target.result],{type:f.type});
      // Delete old cover if replacing
      if(mode==='cover'){
        var old=S.photos[bikeId]&&S.photos[bikeId].cover;
        if(old){
          var oldPath=old.url.split('/flipkit-photos/')[1];
          await sbDeletePhoto(oldPath);
          await sbDelete('photos',old.id);
        }
      }
      var publicUrl=await sbUploadPhoto(path,blob);
      await sbInsert('photos',{bike_id:bikeId,type:mode,storage_path:publicUrl});
      await loadData();render();
      showToast(mode==='cover'?'Cover photo updated':'Photo added');
    }catch(err){console.error(err);showToast('Could not save photo');}
  };
  reader2.onerror=function(){showToast('Could not read photo');};
  reader2.readAsArrayBuffer(f);
});
function openPhotoPicker(bikeId,mode){S.photoTargetBike=bikeId;S.photoMode=mode;fileIn.click();}
function openViewer(photo,bikeId){
  S.viewerPhoto=photo;S.viewerBikeId=bikeId;
  document.getElementById('viewer-img').src=getUrl(photo);
  var l=S.photos[bikeId]&&S.photos[bikeId].listing||[];
  var idx=l.findIndex(function(p){return p.id===photo.id;});
  document.getElementById('viewer-count').textContent=idx>=0?(idx+1)+' / '+l.length:'';
  document.getElementById('viewer').style.display='flex';
}
function closeViewer(){document.getElementById('viewer').style.display='none';S.viewerPhoto=null;}
async function shareCurrentPhoto(){
  if(!S.viewerPhoto)return;
  try{
    var url=getUrl(S.viewerPhoto);
    if(navigator.share){await navigator.share({url:url,title:'Bike listing photo'});}
    else{var a=document.createElement('a');a.href=url;a.download='bike-photo.jpg';a.click();showToast('Photo download started');}
  }catch(e){if(e.name!=='AbortError')showToast('Could not share photo');}
}
async function deleteViewerPhoto(){
  if(!S.viewerPhoto)return;
  try{
    var path=S.viewerPhoto.url.split('/flipkit-photos/')[1];
    await sbDeletePhoto(path);
    await sbDelete('photos',S.viewerPhoto.id);
    closeViewer();await loadData();render();showToast('Photo deleted');
  }catch(e){showToast('Could not delete photo');}
}
async function shareAllListingPhotos(bikeId){
  var photos=S.photos[bikeId]&&S.photos[bikeId].listing||[];if(!photos.length){showToast('No listing photos yet');return;}
  try{
    var urls=photos.map(function(p){return p.url;});
    if(navigator.share){await navigator.share({text:urls.join('\n'),title:'Bike listing photos'});}
    else{urls.forEach(function(u,i){setTimeout(function(){var a=document.createElement('a');a.href=u;a.target='_blank';a.click();},i*400);});showToast('Opening '+urls.length+' photos...');}
  }catch(e){if(e.name!=='AbortError')showToast('Could not share photos');}

/* TOGGLE TASKS */
async function toggleBT(bikeId,taskId,rowEl){
  if(S._toggling===bikeId+'_'+taskId)return;
  S._toggling=bikeId+'_'+taskId;
  setTimeout(function(){S._toggling=null;},600);

  var bike=S.bikes.find(function(b){return b.id===bikeId;});if(!bike){S._toggling=null;return;}
  var task=bike.tasks.find(function(t){return t.id===taskId;});if(!task){S._toggling=null;return;}
  var wasDone=task.done;
  var savedTag=etag(task);

  // Optimistic: update local state and render immediately
  task.done=!task.done;
  render();

  // Check prompts before syncing
  if(!wasDone){
    if((savedTag==='buy'||savedTag==='fix')&&bikeId){
      sbUpdate('bikes',bikeId,{tasks:bike.tasks}); // fire and forget
      setTimeout(function(){openCostPrompt(bikeId,{text:task.text,id:taskId});},180);return;
    }
    var listTs=bike.tasks.filter(function(t){return etag(t)==='list';});
    if(listTs.length>0&&listTs.every(function(t){return t.done;})){
      sbUpdate('bikes',bikeId,{tasks:bike.tasks});
      setTimeout(function(){triggerAutoListed(bikeId);},300);return;
    }
    if(S.screen==='today'){
      var todayTs=bike.tasks.filter(function(t){return t.today;});
      if(todayTs.length>0&&todayTs.every(function(t){return t.done;})){
        sbUpdate('bikes',bikeId,{tasks:bike.tasks});
        setTimeout(function(){revealTodayDone(bikeId);},280);return;
      }
    }
  }
  // Sync in background, reload quietly
  sbUpdate('bikes',bikeId,{tasks:bike.tasks}).then(function(){
    loadData(); // background refresh, no re-render unless another device changed something
  }).catch(function(){showToast('Sync error — check connection');task.done=wasDone;render();});
}
async function toggleST(taskId,rowEl){
  var task=S.standaloneTasks.find(function(t){return t.id===taskId;});if(!task)return;
  var wasDone=task.done;
  task.done=!task.done;
  // Optimistic render
  if(task.done){
    var el=document.getElementById('st-'+_R.indexOf(taskId));
    // find the element by scanning for st- prefixed elements
    var els=document.querySelectorAll('[id^="st-"]');
    var found=null;
    els.forEach(function(e){if(_R[parseInt(e.id.replace('st-',''))]===taskId)found=e;});
    if(found){animDone(found);found.classList.add('exit');}
    sbUpdate('standalone_tasks',taskId,{done:true}).then(function(){
      loadData().then(function(){if(S.screen==='today')renderToday();});
    }).catch(function(){showToast('Sync error');task.done=wasDone;render();});
    return;
  }
  render();
  sbUpdate('standalone_tasks',taskId,{done:false}).catch(function(){showToast('Sync error');task.done=wasDone;render();});
}
function revealTodayDone(bikeId){
  var group=document.getElementById('group-'+bikeId);if(!group)return;
  group.classList.remove('fix-stage','ready-stage','listed-stage');
  group.classList.add('all-done-beat');
  var reveal=group.querySelector('.done-today-reveal');
  if(reveal){reveal.classList.add('show');var btn=reveal.querySelector('.done-today-btn');if(btn)btn.style.display='flex';}
}
function showTodayDoneConfirm(bikeId){revealTodayDone(bikeId);}
async function confirmTodayDone(bikeId,btn){
  document.querySelectorAll('.confirm-sheet').forEach(function(e){e.remove();});
  playSound('done');
  var bike=S.bikes.find(function(b){return b.id===bikeId;});if(!bike)return;
  (bike.tasks||[]).filter(function(t){return t.today&&t.done;}).forEach(function(t){t.today=false;});
  await sbUpdate('bikes',bikeId,{tasks:bike.tasks});
  await loadData();
  var card=document.getElementById('group-'+bikeId);
  if(card){animDone(card);card.classList.add('exit');setTimeout(function(){renderToday();showToast('Done for today \u2713');},440);}
  else renderToday();
}

function renderDetail(){

function renderAddBike(){
  var hdr='<div class="row"><button class="back-btn" onclick="go(\'bikes\')"><svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M11 4L6 9L11 14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button><div style="font-size:17px;font-weight:700">Add a bike</div></div>';
  var dtHtml=S.defaultTasks.map(function(d,i){
    return '<div class="dtask-row"><span class="tag tg-'+d.cat+'" style="flex-shrink:0">'+d.cat+'</span><span style="flex:1;font-size:13px;color:var(--text2)">'+d.text+'</span>'+
      '<button class="toggle '+(d.on?'on':'off')+'" onclick="S.defaultTasks['+i+'].on=!S.defaultTasks['+i+'].on;saveConfig();renderAddBike()"></button></div>';
  }).join('');
  var body='<div class="card" style="padding:14px">'+
    '<div class="form-group"><label class="lbl">Bike name</label><input class="inp" id="nb-name" type="text" placeholder="e.g. Sparta City Blue" oninput="S._nbName=this.value" value="'+(S._nbName||'')+'"></div>'+
    '<div class="form-group"><label class="lbl">Purchase price (\u20AC)</label><input class="inp" id="nb-price" type="number" placeholder="0" inputmode="decimal" oninput="S._nbPrice=this.value" value="'+(S._nbPrice||'')+'"></div>'+
    '<label class="lbl" style="margin-top:2px">Photo <span style="color:var(--text3);font-size:11px">(optional)</span></label>'+
    '<div class="nb-photo-box" onclick="openPhotoPicker(-1,\'cover\')">'+
      (S._nbPhotoBlob?'<img src="'+URL.createObjectURL(S._nbPhotoBlob)+'" alt="">':
        '<svg width="28" height="28" viewBox="0 0 36 36" fill="none" style="opacity:.4"><path d="M4 12A3 3 0 017 9h1.5L10 6h16l1.5 3H29a3 3 0 013 3v14a3 3 0 01-3 3H7a3 3 0 01-3-3V12z" stroke="currentColor" stroke-width="1.8"/><circle cx="18" cy="19" r="5.5" stroke="currentColor" stroke-width="1.8"/></svg>'+
        '<span style="font-size:12px;margin-top:4px">Tap to add cover photo</span>')+
    '</div>'+
    '<div style="height:12px"></div>'+
    '<button class="btn btn-p" onclick="doAddBike()">Save bike</button></div>'+
    '<div class="sec">Auto-loaded tasks</div>'+
    '<div style="font-size:12px;color:var(--text3);margin-bottom:8px">Added to every new bike. Toggle off what you don\'t need.</div>'+
    '<div class="card" style="padding:0 12px">'+dtHtml+'</div>';
  document.getElementById('app').innerHTML='<div class="hdr">'+hdr+'</div><div class="scrl">'+body+'</div>'+navHtml('bikes');
  setTimeout(function(){var el=document.getElementById('nb-name');if(el)el.focus();},60);
}

async function doAddBike(){
  var name=(S._nbName||document.getElementById('nb-name').value||'').trim();
  var price=parseFloat(S._nbPrice||document.getElementById('nb-price').value||0)||0;
  if(!name){showToast('Give the bike a name');return;}
  var defaultTs=S.defaultTasks.filter(function(d){return d.on;}).map(function(d){
    return {id:crypto.randomUUID(),text:d.text,autoTag:d.cat,manualTag:null,cat:d.cat,today:false,done:false,assignee:null,url:null,createdAt:Date.now()};
  });
  var frameSize=S._nbSize||'';
  var photoBlob=S._nbPhotoBlob;
  S._nbName='';S._nbPrice='';S._nbSize='';S._nbPhotoBlob=null;S._nbPhotoName='';
  var row=await sbInsert('bikes',{name:name,bought:price,frame_size:frameSize||null,tasks:defaultTs,sold:false});
  var id=row.id;
  if(photoBlob){
    var path=id+'/cover-'+Date.now()+'.jpg';
    var publicUrl=await sbUploadPhoto(path,photoBlob);
    await sbInsert('photos',{bike_id:id,type:'cover',storage_path:publicUrl});
  }
  await loadData();
  if(S._returnToAddTask){
    S._returnToAddTask=false;S.modalData.bikeId=id;
    S.screen='today';render();renderTaskModal();
  } else {
    S.bikeId=id;S.screen='detail';render();
  }
  showToast('Bike added!');
}

async function saveTask(){
  var d=S.modalData;
  var inp=document.getElementById('task-inp');
  var text=(inp?(inp.value||inp.textContent||''):d.text||'').trim();
  if(!text){showToast('Enter a task description');return;}
  var at=autoTag(text);
  var tag=at||d.manualTag||null;
  var newTask={id:crypto.randomUUID(),text:text,autoTag:at,manualTag:d.manualTag,cat:tag||'other',today:true,done:false,assignee:d.assignee,url:d.url||null,createdAt:Date.now()};
  if(d.mode==='add'){
    if(d.bikeId){
      var bike=S.bikes.find(function(b){return b.id===d.bikeId;});if(!bike)return;
      if(at==='list')bike.tasks=(bike.tasks||[]).filter(function(t){return !(etag(t)==='list'&&!t.done);});
      else if(at==='photo'){var di=(bike.tasks||[]).findIndex(function(t){return etag(t)==='photo'&&!t.done;});if(di>=0)bike.tasks.splice(di,1);}
      else if(at==='clean'){var di2=(bike.tasks||[]).findIndex(function(t){return etag(t)==='clean'&&!t.done;});if(di2>=0)bike.tasks.splice(di2,1);}
      bike.tasks=bike.tasks||[];
      bike.tasks.push(newTask);
      await sbUpdate('bikes',d.bikeId,{tasks:bike.tasks});
    } else {
      await sbInsert('standalone_tasks',{text:text,auto_tag:at,manual_tag:d.manualTag,cat:tag||'other',today:true,done:false,assignee:d.assignee,url:d.url||null});
    }
  } else {
    if(d.type==='bike'){
      var bike2=S.bikes.find(function(b){return b.id===d.bikeId;});if(!bike2)return;
      var task2=bike2.tasks.find(function(t){return t.id===d.taskId;});if(!task2)return;
      task2.text=text;task2.autoTag=at;task2.manualTag=d.manualTag;task2.cat=tag||task2.cat||'other';task2.assignee=d.assignee;task2.url=d.url||null;
      if(d.today!==undefined)task2.today=d.today;
      await sbUpdate('bikes',d.bikeId,{tasks:bike2.tasks});
    } else {
      await sbUpdate('standalone_tasks',d.taskId,{text:text,auto_tag:at,manual_tag:d.manualTag,cat:tag||'other',assignee:d.assignee,url:d.url||null,today:d.today});
    }
  }
  closeAllModals();await loadData();render();
}
async function deleteTask(){
  var d=S.modalData;
  if(d.type==='bike'){
    var bike=S.bikes.find(function(b){return b.id===d.bikeId;});if(!bike)return;
    bike.tasks=(bike.tasks||[]).filter(function(t){return t.id!==d.taskId;});
    await sbUpdate('bikes',d.bikeId,{tasks:bike.tasks});
  } else {
    await sbDelete('standalone_tasks',d.taskId);
  }
  closeAllModals();await loadData();render();showToast('Task deleted');
}

async function markSold(bikeId,btn){
  var priceEl=document.getElementById('sold-price-inp');
  var price=parseFloat(priceEl&&priceEl.value)||0;
  if(!price){showToast('Enter a sold price');if(priceEl)priceEl.focus();return;}
  if(btn)btn.closest('.confirm-sheet').remove();
  await sbUpdate('bikes',bikeId,{sold:true,sold_for:price});await loadData();
  animSold();
  var scrl=document.querySelector('.scrl');
  if(scrl){scrl.style.transition='opacity .6s,transform .6s';scrl.style.opacity='0';scrl.style.transform='scale(.97) translateY(20px)';}
  setTimeout(function(){S.bikesFilter='sold';go('bikes');},1900);
}
async function deleteBike(bikeId){
  if(!confirm('Delete this bike and all its data?'))return;
  // Delete storage photos first
  var allPh=(S.photos[bikeId]&&S.photos[bikeId].listing||[]).slice();
  if(S.photos[bikeId]&&S.photos[bikeId].cover)allPh.push(S.photos[bikeId].cover);
  for(var i=0;i<allPh.length;i++){
    var path=allPh[i].url&&allPh[i].url.split('/flipkit-photos/')[1];
    if(path)await sbDeletePhoto(path);
  }
  // Delete bike row — costs and photos rows cascade automatically
  await sbDelete('bikes',bikeId);
  await loadData();go('bikes');showToast('Bike deleted');
}

/* MAIN RENDER */
function render(){
  if(S.screen==='today')renderToday();
  else if(S.screen==='bikes')renderBikes();
  else if(S.screen==='detail')renderDetail();
  else if(S.screen==='add-bike')renderAddBike();

/* PWA */
function injectManifest(){
  var manifest={name:'FlipKit',short_name:'FlipKit',start_url:'./',display:'standalone',background_color:'#0f0e0d',theme_color:'#0f0e0d',orientation:'portrait',
    icons:[{src:"data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' rx='38' fill='%230f0e0d'/><circle cx='56' cy='130' r='28' stroke='%23e8a547' stroke-width='10' fill='none'/><circle cx='136' cy='130' r='28' stroke='%23e8a547' stroke-width='10' fill='none'/><path d='M56 130L80 68H130L140 130' stroke='%23e8a547' stroke-width='10' stroke-linecap='round' stroke-linejoin='round' fill='none'/><circle cx='96' cy='52' r='14' fill='%23e8a547'/><path d='M106 68L116 130' stroke='%23e8a547' stroke-width='10' stroke-linecap='round'/></svg>",sizes:'192x192',type:'image/svg+xml'}]
  };
  var blob=new Blob([JSON.stringify(manifest)],{type:'application/json'});
  var link=document.createElement('link');link.rel='manifest';link.href=URL.createObjectURL(blob);
  document.head.appendChild(link);
}

/* REAL-TIME SYNC */
function setupRealtime(){
  // Supabase real-time via WebSocket
  var wsUrl='wss://alhxqzamfgfeiewfyegm.supabase.co/realtime/v1/websocket?vsn=1.0.0&apikey='+SB_KEY;
  var ws;
  function connect(){
    try{
      ws=new WebSocket(wsUrl);
      ws.onopen=function(){
        // Subscribe to all table changes
        var sub={topic:'realtime:public',event:'phx_join',payload:{config:{broadcast:{self:false},presence:{key:''},postgres_changes:[
          {event:'*',schema:'public',table:'bikes'},
          {event:'*',schema:'public',table:'standalone_tasks'},
          {event:'*',schema:'public',table:'costs'},
          {event:'*',schema:'public',table:'photos'}
        ]}},ref:'1'};
        ws.send(JSON.stringify(sub));
        setOnline(true);
      };
      ws.onmessage=async function(e){
        var msg=JSON.parse(e.data);
        if(msg.event==='postgres_changes'||msg.event==='INSERT'||msg.event==='UPDATE'||msg.event==='DELETE'){
          await loadData();render();
        }
        // Heartbeat
        if(msg.event==='phx_reply'&&msg.ref==='1')setOnline(true);
      };
      ws.onerror=function(){setOnline(false);};
      ws.onclose=function(){setOnline(false);setTimeout(connect,5000);}; // reconnect
    }catch(e){setOnline(false);}
  }
  connect();
  // Ping every 25s to keep alive
  setInterval(function(){if(ws&&ws.readyState===1)ws.send(JSON.stringify({topic:'realtime:public',event:'heartbeat',payload:{},ref:'hb'}));},25000);
}
function setOnline(on){
  var dot=document.getElementById('sync-dot');
  if(dot)dot.style.background=on?'var(--green)':'var(--red)';
}

/* INIT */
async function init(){
  injectManifest();
  document.getElementById('app').innerHTML='<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--text3)"><svg width="32" height="32" viewBox="0 0 36 36" fill="none"><circle cx="6" cy="28" r="5" stroke="var(--amber)" stroke-width="2.2"/><circle cx="30" cy="28" r="5" stroke="var(--amber)" stroke-width="2.2"/><path d="M6 28L12 12H26L30 28" stroke="var(--amber)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="18" cy="9" r="3" fill="var(--amber)"/></svg><div style="font-size:13px">Loading FlipKit…</div></div>';
  try{
    await loadData();
  }catch(e){
    document.getElementById('app').innerHTML='<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--red);padding:32px;text-align:center"><div style="font-size:15px;font-weight:600">Could not connect</div><div style="font-size:13px;color:var(--text3)">Check your internet connection and try again.</div><button class="btn btn-p" style="margin-top:16px;max-width:200px" onclick="init()">Retry</button></div>';
    return;
  }
  setupRealtime();
  render();
}

init();
</script>
